name: Sync to Hugging Face via API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          
          # 使用官方高端 API 直接同步整个文件夹，它会自动处理二进制大文件
          api.upload_folder(
              folder_path='.',
              repo_id='z77177/BrooklynTV',
              repo_type='space',
              delete_allow_list=['*'] # 类似于 git push --force，保持两端文件完全一致
          )
          "
