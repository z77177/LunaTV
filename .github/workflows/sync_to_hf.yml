name: Sync to Hugging Face

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # 确保下载拉取 LFS 文件

      # ====== 新增：在环境中安装并配置 Git LFS ======
      - name: Setup Git LFS
        run: |
          git lfs install
          
      - name: Force Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 临时配置凭证，让 git lfs push 也能正确使用 token
          git config --global credential.helper store
          
          # 强推到 Hugging Face
          git push --force https://z77177:$HF_TOKEN@huggingface.co/spaces/z77177/BrooklynTV main
